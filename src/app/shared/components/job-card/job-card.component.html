<div class="card border-0 shadow-sm p-3 mb-3 hover-card">
  <div class="card-body d-flex align-items-center">
    <div class="flex-shrink-0">
      <img [src]="job.logo" [alt]="job.company" class="rounded-3" style="width: 60px; height: 60px; object-fit: cover;">
    </div>
    
    <div class="flex-grow-1 ms-4">
      <h5 class="mb-1 fw-bold display-font">{{ job.role }}</h5>
      <p class="text-muted mb-2">{{ job.company }} • {{ job.location }}</p>
      <div class="d-flex gap-2">
        @for (tag of job.tags; track tag) {
          <span class="badge bg-light text-dark fw-normal border">{{ tag }}</span>
        }
      </div>
    </div>

    <div class="text-end">
      <div class="fw-bold text-dark-blue mb-2">{{ job.salaryRange }}</div>
      <span class="badge rounded-pill" 
            [ngClass]="{'bg-success-subtle text-success': job.type === 'Remoto', 'bg-info-subtle text-info': job.type !== 'Remoto'}">
        {{ job.type }}
      </span>
    </div>
  </div>
</div>
