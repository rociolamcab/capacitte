<div class="card h-100 border-0 shadow-sm hover-card">
  <img [src]="course.image" 
     class="card-img-top rounded-top-4" 
     [alt]="course.title"
     onerror="this.src='https://placehold.co/400x250?text=Capacitte'">
  <div class="card-body p-4">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle px-2">
        {{ course.category }}
      </span>
      <span class="text-muted small"><i class="bi bi-star-fill text-warning"></i> {{ course.rating }}</span>
    </div>
    <h5 class="card-title fw-bold display-font">{{ course.title }}</h5>
    <p class="text-muted small mb-3">Por {{ course.instructor }}</p>
    <div class="d-flex justify-content-between align-items-center mt-auto">
      <span class="fs-5 fw-bold text-dark-blue">{{ course.price === 0 ? 'Gratis' : (course.price | currency:'EUR') }}</span>
      <button class="btn btn-outline-primary btn-sm rounded-pill px-3">Ver detalles</button>
    </div>
  </div>
</div>
